body:
  text: 住相州淨妙禪寺語録侍者玄仁編山門大解脫門誰能入作八字打開全無肯路新長老汝通一線驟步而入佛殿佛休許由洗耳巢父牽牛因甚踏步向前插香云不是冤家不聚頭據室撗拈主丈云商君法孫武令全提時節佛祖𠧒命顧視左右莫有向這裏出氣底麼良久吽拈帖振興佛法聳動人天把定放行全在裏許未證據底拈起帖云看山門疏相唾饒你潑水相罵饒你接觜何也大家在這裏諸山疏貶我鐵綿團褒我錦包特石箇中親切一句子生鐵蒺䔧當靣擲法座機不離位墮在毒海驟步登座云須燈王不知所在祝香罷又拈香云此香揚在寒岩谷皮膚脫落盡久矣今日無端重生枝未免拈出供養圓覺開山諡佛光禪師無學大和尚用酬法乳之恩就座索話云一句子在機先眨得眼來十万八千莫有向那邊點頭底麼問答不録乃云翠竇煙岩藏醜拙臥雲眠月謝塵寰天網難回避不覺全身入虎關便見不寸刃折衝千里地靈人傑坐致太平幸自清平𠀍界何必禪論道直饒棒如雨點喝似雷奔且請束之高閣雖然如是𠀍界未形生佛未具已前驀拈主丈卓一下云還識有這一著子麼若識得去許汝天下橫行把定則黃頭碧眼飲氣吞聲放行則蝦蟆蚯蚓動地放光不把定不放行堪報不報之恩用助無為之化正恁麼時且道功歸何𩂜良久天上有星皆拱北人間無水不朝東舉法燈示衆云本欲深藏岩嶽隱遁過時奈何清涼先師有未了底公案未免出來它了卻時有僧出問如何是未了公案燈打云祖禰不了殃及兒孫拈云法燈訐以為直者僧招禍上身檢點將來何曾了卻新淨妙本欲深藏岩嶽隱遁過時奈何佛光先師有未了公案未免出來他了卻若有人出來道如何是未了公案只向他道低聲何故子為父隱直在其中當晚小參索話云答不答垜生招箭賔主機先如何相見問答不録師乃拈主丈云文殊三處度夏歷相六國未是良謀思大目視雲霄餓死首陽豈為奇䇿衲僧家把不定掣斷金鎖撥轉玄關或卷或舒乍彼乍此况日上座三十餘年在孤峰頂上人相逢卻向十字街頭握手即今在十字街頭人相逢卻向孤峯頂上握手不是革轍通途亦非隨鄉入俗無古無今無延無促阿呵斷絃須是鸞膠續卓一下復舉藥山和尚小參示衆云有一句子待特牛生兒卻向汝道時有僧出云特牛生兒也請和尚道山云將火來僧抽身歸衆拈云藥山暗裏投明珠者僧卻下九重淵爭奈主賔當靣蹉過大衆要知藥山誵訛處麼不勘自敗中秋上堂中秋節許誰知寒山子錯題詩啞新月有圓夜人心無滿時淨妙語録終金寶山淨智禪寺語録侍者妙康編指三門云痛棒熱喝撼動乾坤佛祖難入作一踏云樊噲踏鴻門佛殿千輻輪踏地無見頂撑天既是無見頂目前是什麼插香云杖林山下竹根鞭便禮拜據室摩竭掩室毗耶杜口喝一喝猛虎不餐伏肉便起拈帖把定封疆號令佛祖只這一著文彩未露見麼舉起帖云公驗分明山門疏金峯万仞立處孤危放開一線還落便冝啞誣人之罪以罪加之法座坐斷毗盧頂底猶墮這一座中驟步登座云看看鳳栖不在梧桐祝香罷就座索話𮈔綸千尺意在巨鰲三山連一掣任聽浪頭高僧問一佛出𠀍天垂寶蓋地湧金蓮和尚出𠀍有何祥瑞師云三冬枯木花進云祝聖一句又作麼生師云海晏河清進云恁麼則四海浪平龍睡九天雲靜鶴飛高師云時清不用唱巴歌進云記得三聖道吾逢人則出則不為人意在那裏師云用盡自己心笑破它人口進云既出因甚不為人師云一手搦一手擡進云興化道吾逢人則不出則便為人意旨作麼生師云敗不少進云既是逢人因甚不出師云不同門外遊人進云可謂二老同途不同轍和尚別有為人處也無師云生鐵蒺䔧當靣擲進云若不上來伸此問焉知滄海有明珠師云百雜碎又有僧出問昔日閩王送羅山入院山才登座重便下座意在那裏師云五更侵早起更有夜行人進云王把山手云今日一會何異靈山還端的也無師云今古應無墜分明在目前進云只如大檀越台斾親送和尚入院未審有何𭤸設師云馨香滿道途進云恁麼則非但正法眼藏增高價靈山一會儼然未散師云金色頭陀笑點頭進云昔日羅山今日和尚師云眼相對僧禮拜師乃云淨智妙圓杲日麗天體自空寂左轉右旋昨日乾明主人今朝金峯長老在彼在此本無間然便見無邊剎海不隔毫端一切處莊嚴一切智成就人人眼空宇宙箇氣吞佛祖何也猛將之下無劣兵復舉雪竇明覺大師一日李殿撰坐次有一秀才一道士從外入來撰云三教之中那教最貴雪竇起身側立撰云有口何不道竇云對夫子難言師云雪竇通身是口記已了也因甚𨚫道對夫子難言良久碁逢敵手難藏行一著還它一著高當晚小參拈主丈云一句子左邊卓一下云出于千佛頂上一句子右邊卓一下云豁開無盡寶藏臨濟三玄曹洞五位溈仰圓相法眼綱宗中間卓一下云渾從這裏流出了也各自分疆列界到處稱尊若到明眼人前只得一場好笑只如𠀍界未形生佛未具時多少間絡索安在什麼處又卓一下云天高群象正海闊百川朝復舉德山小參示衆今夜不答話問話者三十棒太平寰宇動干戈時有僧出赤體挨白刃山便打瞎棒作麼僧云某甲話未問在更深猶自可午後使人愁山云汝是甚處人來處也不辨僧云新羅人果然猶隔海在山云未跨船舷好三十棒猶較些子然雖如是還知這僧未離新羅已前已勘破德山處麼那裏是他勘破處具眼者辨取閏臘月旦上堂拈主丈云臘又臘寒最寒霜風凜凍破泥團少處添多處減會麼卓一下云三年一閏除夜小參拈主丈云末後一句把斷要津卓一下云放開一線万國逢春直得處清茶談話家濁酒狂歌三三兩兩靣靣且道即今喚作舊年也即是喚作新歲也即是若作新歲臘月未盡若作舊年已是逢春主丈子試代諸人斷看卓一下云稱鎚渾是鐵舉僧問趙州如何是不遷義州以手作流水勢其僧有省拈云老趙州通身是口皮樿無截流機此僧雖然省悟爭奈摩斯落水喝一喝正旦上堂無隂陽地風月斬新卓主丈云踈影橫斜岩下水暗香浮動劫壺春上元上堂一𫨻光明十虛照徹不是人間燈亦非天上月還有回光返照底麼默照邪禪徒偷心未死盡卻道不昧靈臺不是瞻視光影啞夜深老鼠上燈臺佛涅槃上堂記得𠀍尊臨入涅槃文殊大士請佛再轉法輪𠀍尊咄云文殊吾四十九年未曾一字汝請吾再轉法輪是吾曾轉法輪耶大衆還會瞿曇末後句麼良久鯨吞海水盡露出瑚枝三月旦上堂聞聲悟道見色明心客遊三月鶯囀千林擔板禪和癡兀坐窗前任聽落花深結夏上堂三期行甚清絶內外一如身心寂滅金寶一會衆生涯還自別別別三冬枯木花九夏寒岩雪上堂行亦禪坐亦禪劒去久矣誰刻船目前無法意在目前不是目前法會麼翡翠踏荷雨鷺鷀衝破竹林煙端午上堂五月五天中節万戶千門書符捏訣金寶一味癡頑何也家無白澤之圖豈有如是妖孽中夏上堂前半夏不將後半夏不迎只愛寥夏日長青扇子足風涼遠山雨過對斜陽解夏上堂九夏賞勞絶毫絶𨤲天機漏泄月冷風高靈利漢剔起便行主丈頭穿過列祖鼻孔草鞋尖踢出諸佛眼睛然雖如是向道莫行山下路果然猿呌斷腸聲九月旦上堂摩騰入漢太平寰宇卻招亂達磨西來無端平地起波瀾金寶今日又作麼生万里片雲收秋高爽氣浮退院上堂已歷期年住寶峰了無一法玷門風杖頭更有乾坤闊隨處何妨祝聖躬淨智語録終住相州巨福山建長禪寺語録侍者玄挺妙環編指三門云廣大樓閣峭峻門撥轉關捩拔楔抽釘喝任他平地鼓雷霆佛殿無佛處獨尊主賔誰共你論分身千百億水出自高源土地顯應靈聰明智鑑微于三際察秋毫于萬里不是是非眼何曾墮一臂祖師二三四七此土西天直指如何指單傳作麼傳咦誰識鵉膠續斷絃據室拈主丈云囊砂背水殺活臨機橫按丈云大衆退後隱乎坐重圍拈帖閫外令句中眼點則不到則不點衲僧家呼喚不回一走千里因甚被一印住舉帖云公驗分明在手裏山門疏是自家屋裏底那容家醜外邊揚掩之不可得一任錯商量諸山疏精識精賊知賊就中不許邏贓人臨濟未是白拈賊江湖疏一褒一貶互相塗糊其甘如萕其苦如荼啞𢙣聲此滿江湖法座須燈王佛和座子敗闕當頭坐斷虛空迸裂祝聖罷復拈香云𠃵坤未剖根地實不假海岸激射之熏烈何用南蠻舶主之資質清香難掩不免輕拈出𤍽向爐中供養前住當山開山圎覺東山第八𠀍敕諡佛光禪師無學大和尚不是報恩只要酬冤遂趺座云門躍鱗幾遭點額透過三級試呈頭角僧問掣開金殿鎖撞動玉樓鍾猊座高登請師祝聖師云獨角麒麟登海嶼進云恁麼則非唯佛日增光一片皇風浩蕩春師云九天雲靜封疆闊進云只如大檀越請和尚開堂演法未審演亇何法師云杲日當空進云人天交接兩淂相見今日一會何異靈山師云今古應無墮分明在目前進云記得法燈禪師新入院對衆云本𣣔深藏岩嶽隱遁過時爭奈清涼先師有未了因緣出來他了卻意旨如何師云用盡自己心笑破它人口進云法燈果然為它了卻得也未師云證蜂桶羊進云心外無法滿目青山喚什麼作清涼未了底因緣師云抱贓呌屈進云和尚今日出來應亇時節佛光先師還有未了因緣也無師云子為父隱進云出則便為人何妨為它了卻普應群機師云虛空背上白毛生進云不因台命起岩隱爭得人天聞未聞師云何不把禪床靠倒進云金毛師子方哮吼一時走散野干鳴師云利劒拂開天地靜進云手裏春風間不淂又來溪上種桃花師云馨香滿道途僧禮拜師乃云大機獨運卷舒立方外𠃵坤大用全彰橫挂域中日月雙明又雙暗全放又全收日上座平生枯禪窮山有口挂壁未曾道著元字腳將謂𠦡自可憐生今日無端被業風飄轉未免應亇時節略露風規雖然不是目前機亦非心外法門頭柖檜不壓而滴翠屋後池水不挼而湛藍只如大檀越台斾入山令山僧為國開坣演法報恩酬德一句作麼生道卓丈一下云華嶽連天秀黃河徹底清復舉僧問百丈如何是奇特事丈云獨坐大雄峰僧禮拜丈便打師云盡道者僧禮拜爛泥有刺百丈便打倚勢欺人未免管中窺豹顧視左右云必竟知它落處麼良久重賞之下有勇夫當晚小參靈山百万衆迦獨破顏少室九年後神光冷眼看撿點將來雄雞生鵠卵以至德山僻執趙州圎轉不勘自敗劈口便𡎺自餘間佛間祖盡天下老凍儂向什麼處出氣去也山僧今夜小參只得咬㝎定牙關忽有亇漢衝衆出來道新長老未知門限高低鍋子大小因甚得恁麼口吧地啞前汗馬無人識只要重論蓋代功舉僧問趙州如何是道州云墻外底僧云不問這亇道州云問那亇道僧云大道州云大道透長安山僧有亇道處試舉似大衆來大道無方所底㕝趙州鼓口唇紫陌紅塵飛不到月明照見夜行人上堂有運斤手誰能就斫空手相逢不放過當機拗折驪角坐觀成敗時節主山高案山低若作主賔人境會鷓鴣飛過落花溪接官府宣望闕謝恩一幅天書來日邊九重和氣滿山川扶桑万里無雲處仰祝聖明千万年便見祖道興振王道平稽首九首傾心志心臣僧顯日下情無任感天荷聖激切屏營之至拈敕黃云諸人還會麼王言如絲其出如綸就座拈香此一瓣香恭為祝延今上皇帝聖壽無疆恭願天清地泰九垓永佐皇圖時和年豐万邦盡皈聖德遂趺坐云風恬浪靜老龍眠驪珠不惜誰下九渕問答不録乃云太平無象君聖臣直君臣道合方彰盛德爰知昔受靈山記曾乘大願力興建大廈高坣呈露壯麗嚴飾綿亘十方綸八極看交接百億人天聳動無邊佛國以何為驗良久我皇有勑臣僧顯日恭奉特賜聖旨榮寵當山領衆迎接永鎮山門涓耴良辰升于此座舉揚正法眼藏仰祝聖壽無疆上感聖恩上感聖恩復拈主丈説偈云遠頌聖澤布堯仁古佛場中瑞氣新將底酬恩崇算大椿八千春浴佛上堂舉藥山和尚因遵布衲浴佛山云這亇你浴那亇還浴淂麼遵云把將那亇來山便休師云布衲橫機不讓好一拶藥山便休老不以筋力為能福山不問這亇那亇以手作浴佛勢云當頭一拶難回避便下座結制小參拈主丈云若能知有還成窠臼剔起便行外邊亂走直饒超過威音已前猶向老僧背後義手矧復克期限護聖制不知刻舟劒去已久雖然汝若證龜成鱉我便指槐罵柳你若把楚雞為鳳我便喚師子為狗阿呵卓丈一下驚起法身藏北斗舉僧問汾陽如何是祖師西來意答云青扇子足風涼師云汾陽陳年破扇子高閣架頭不足用福山當斯聖制不妨漏泄天機祖意明休借問青扇子不同參三更孤月斷雲外一鼓薰風到自南翌日上坣古佛真宗列祖家風特摽象外捏㝎寰中甚禁足護生猛虎當途遇物則噬論甚克期修證接竹點月掘地覔天福山這裏全無縫𦉑鶻眼鷹睛窺覻無門如是安居如是結制喚作唯除頓覺人并法不隨順底得麼良久百匝千里俱粉碎倚天長劒逼人寒謝秉拂上坣四貟頭首全賔全主照用同時杲日當手殃害天下衲僧號令上佛祖只者一拂柄入手裏一拂云撼動寰宇山嶽起舞重五上堂万病靈藥一莖瑞草扁鵲未知耆婆難討即今山僧現成受用去也卓丈一下直得一切抱病者神清氣爽息惱阿呵喚起毗耶癡愛老上堂目前無法意在目前絶毫絶𨤲遍地遍天不是目前法非耳目之所到未明三八九難踏古皇道雨濛草茸斷碑鐫白字當道種青謝翆蘿東里和尚至上堂遠離翆蘿一朵峰片帆高挂十分風當陽誰識西來意万里扶桑在海東七月旦上堂拈主丈云一落天下秋一塵起大地收卓一下靠倒嘉州大象驚起陝府鐵牛解夏小參僧問節屆解制布袋口開九旬賞勞請師提唱師云金雞破琉璃殼玉兔挨開碧海門進云一把香芻拈未暇六環金錫響遙空莫便是麼師云鷂子過新羅進云記得翆岩示衆云一夏為兄弟話看翠岩眉毛在麼意旨如何師云羅公照鏡進云長慶云生也未審具甚眼目師云畫成狸進云保福云作賊人心虛又作麼生師云巡人犯夜進云雲門云關聻師云撓鉤搭索進云只如諸大老恁麼道還有優劣也無師云一坑埋却進云白雲盡處是青山行人更在青山外師云重疊關山路僧禮拜師乃云金聲玉振集大成一曲兩曲宮商外賞音能幾人衲僧家万機休罷千聖不聞佛一字急洗耳道正因漱口三日因甚如是鶴有九皋難翥翼馬無千里漫追風復舉岩頭參德山方跨門便問是凡是聖山便喝頭禮拜有人舉似洞山山曰若不是奯公大難承當頭聞云洞山老人不識好𢙣錯下名言我當時一手擡一手搦師云德山有斬蛟劒岩頭具陷機只如末後道一手擡一手搦又作麼生曙色未分人盡望及乎天曉也尋常中秋上堂以拂子打圎相云人有這亇誰敢正眼看修行供養本分不安拂袖便去何絶攔啞言迹之起太生異端良久今宵不隔千山月無限清光分外寒重九上堂謝建仁約翁和尚全西堂至作家相見意在當陽不用險機絶境不墮無事平常全提一句作麼生商量擊禪床云節屆重陽日短夜長上堂謝南首座始藏主用維那矩侍者至大藏小藏一字不三喚三應家私漏泄只如睦州賺臨濟興化打克賔又且如何辨別卓丈一下云打刀須是邠州鐵開爐上坣火爐頭不行令無賔主話陷機穽照顧眉毛看冷灰發焰火星迸上堂万機休罷千聖不不用橫竪不用全提半提撫膝云到頭霜夜月任運落前溪圎覺寺挂御書額宸翰爍然文彩彰當陽揭示發祥光大圎覺海莊嚴域從此門風万古昌雲漢騰蛟蟠霄鳳舞鵉翔至尊至貴為瑞為祥銅睛鐵眼莫錯商量指額云若也分明薦取許你獨步大方冬夜小參一氣未兆前有㝎𠃵坤句黃面老子三百餘會盡力不出碧眼胡僧九年面壁到頭覻不透德山棒頭短臨濟口門窄福山冷地看來依舊晷運推移日南長至然雖如是冬不寒臘後看翌日上坣仲冬嚴寒凍破泥團良久化機消息轉鮎魚上竹竿上堂謝秉拂臨濟四料揀當機孰能辨福山門下四頭首與奪擒如閃電大衆還要分明會耴麼良久聲前句後新羅箭上坣一年十二月一日十二時時時全躰現莫道落便冝雖然如是不是一畨寒徹骨爭得梅花撲鼻香除夜小參年窮歲盡年窮爆竹聲驚破殘臘半宵夢春風處吹起紙錢一堆灰李公醉倒街頭元是張公喫酒若作世諦流布壁上燈大開笑口若作佛法商量坣前露柱未肯點頭退後鐵壁鐵壁將謂李陵陷虜誰知樊噲踏鴻門擊禪床一下舉僧問香林万頃荒田是誰為主林云看臘月盡師云香林用處天地不仁問福山万頃荒田是誰為主只向他道鐵牛耕開劫外春且道福山香林相去多少具眼者辨耴上元上堂從上來沒巴鼻燈相續冷熖未已所謂一燈然百千燈百千燈一燈起唯有潭老一吹吹滅何也我見燈明佛本光瑞如此退院上坣拋離玉殿瓊樓上皈隱煙霞泉石中八臂那吒攔不住回途石馬出羅建長語録終再住淨智禪寺語録侍者妙凖妙環編再住上坣孤䇿當年下寶峰重來老倒步躘踵滿山風月依前好再面儼然對大雄大衆還會麼良久前汗馬無人識只要重論蓋代功謝兩班上堂叢林輔弼之士還須遠見高識𭓩如天蓋地擎翊贊紀綱將仆磨不磷兮涅不緇誰言鵉鳳栖枳𣗥結夏小參威音已前無師自悟正眼看來是第二句九旬安居十方同聚擬尅期取證討甚間家具本色衲僧己靈不重大闡提機諸聖不慕忽有亇漢衝衆出來道長老長老未免多少葛藤露布啞鷺鴛衝破竹林煙翡翠踏荷雨復舉僧問中雲何山起風何澗生云盡力𭤸為不離中師云中只有受璧之心更無城之意金峰則不然若有僧問雲何山起風何澗生只向它道吟虎嘯謝頭首秉拂上坣龜毛拂子柄入手奪擒指槐罵柳雖然四頭首一言未出口還會麼黃絹幼婦外孫臼中夏上堂炎六月蟬聲嗚咽全提句子機先漏泄臨濟底㕝上黃檗破夏往還心未歇七月旦上堂落知秋墮第二頭動絃別曲万里崖州趙老放下韶陽六不收良久有意氣時添意不風流處也風流解制小參説到行不到處眉毛有幾莖行到不到時明眼人落井金峰一夏渾崙無縫𦉑論甚麼行到不到到行不到咄万里崖州君自去臨行惆悵他誰復舉僧問雲門樹凋落時如何門云躰露金風師云雲門老漢未免墮者僧圈繢若有人問金峰樹凋落時如何答云洞中山色四時好雲外溪聲一樣寒解制上坣九夏賞勞痛棒熱喝剔起便行眼睛忽活万里煙雲一抹秋鴈行沒處水天闊擲丈下座謝兩班上坣摩訶衍法揮劒太量外之機遊創事海忽爾機輪撥轉天齊力有時金鎚影動古佛競頭參大衆還會麼若也不會問取侍者邉中秋上堂僧問十五日已前八月秋猶熱十五日已後一天風更涼正當十五日以何指示人師云今夜一輪滿清光何處無進云與麼則素魄今宵已十分廣寒宮闕啓重門師云清風拂白月進云青風露桂誰是心空及第人師云切忌遭點額進云昔日馬大師玩月次問諸子云正當恁麼時如何百丈云正好修行意旨作麼生師云明眼人落井進云西坣道正好供養又作麼生師云失却半年糧進云南泉拂袖便去可謂家富少嬌師云不許夜行進云馬師云禪皈海經皈藏唯有普願獨超物外大似憐子不覺醜師云一場敗進云後來佛光禪師頌曰馬師父子弄琵琶無奈江西月色何還端的也無師云幾證蜂桶羊進云將謂舉𠀍賞音少更有鵉膠續斷絃師云離絃一箭新羅外進云非但人天聞未聞四生九類霑恩澤師云相識滿天下知心能幾人乃云明月上孤峰雪步沒眼中誰著屑瘦鶴翹寒柖大衆還見麼雲外早飛去也拋拂下座謝書記上堂舉五祖演和尚云若有人向空裏書淂祖師西來意五字老僧展坐具拜伊頌云只這虛空量大紙縱橫無欠亦無餘西來五字炳然露誰識有人背手書重九上堂陶靖節倚欄干三玄旨隔重關何也采掬東籬望南山開爐上堂僧問行者擊鼓和尚升座大衆問訊侍者燒香那亇是賔主相見處師云坐立儼然進云只如道南方火爐頭有亇無賔主話此意如何師云照顧眉毛進云金峰門下今日開爐把木佛作薪淂麼師云只恐有眉墮落底進云與麼則靈九轉透香師云切忌貪它一粒米僧禮拜師乃云佛性義時節緣冷灰堆裏黑豆𪹼然雖然火種無多子端的今年勝去年冬夜小參天寒人寒滴水滴凍低頭坐圍爐仰面看梁棟誰管否去泰來任它砂飛石走堪笑溈仰呈懞袋叉手進前少賣弄何也楚雞不是山鳳復舉洞山冬夜喫果子次問泰首座有一物黑似漆常在動用中動用中收不淂過在甚麼處泰云過在動用中山令侍者掇退果卓拈云盡道泰首座鈍鳥宿蘆老洞山俊鷹摩霄殊不知吳地雪寒越山風暖至節上堂謝檀那至寒岩那畔石筍生谷暖回劫外春君子道長好時節慶雲瑞氣滿天新謝秉拂上堂拈主丈云龜毛拂子有放有收兔角拄杖有縱有橫日前四頭首恁麼受用去了也只如龜毛兔角作麼生受用去卓一下云有意時添意不風流處也風流臘八上堂六年冷坐髑髏未𠃵半夜成道欺它自瞞瞿曇性命却在山僧手裏卓主丈云霜刀舉處斗牛寒臘月望上堂此亇事不間公案未透咬定牙關雲門一曲機先會臘月光隂一瞬間元旦上堂時哉天新地新万象森羅氶化育野花啼鳥一般春上元上堂亂線孟春三五雨不知天上月圎時迦文錯受燃燈記千古貪光心自飢只有龍潭老一吹吹滅去啞衆裏猶有鼻笑底何也我見燈明佛本光瑞如此三月半上堂万機休罷千聖不休論向上向下莫全提半提何也鷓鴣飛過落花溪四月旦上堂虛玄大道無真宗機先句子電火罔通只如道麻三斤𠃵屎橛金圈栗𣗥蓬作麼生話會良久麥撚黃桑翼刷緣浴佛上堂拈起拄杖云未離兜率降王宮不萌枝上百花紅未出母胎度人畢兩手扶犂水過膝指天地獨稱尊幸有老雲門知恩正解報恩卓丈下座結夏小參僧問聖制紀綱盡付來日𥘵宗家訓要在今宵不吝指南請師指示師云德嶠趙老垜生招箭進云南泉斬貓兒意旨如何師云劈開華嶽連天色進云趙州戴草鞋出去是甚心行師云放出黃河入海聲僧禮拜師乃云揮王庫刀血濺梵天撾塗毒鼓聲震大千直得十聖三玄四生九類盡天下衲僧喪身失命所以護生須是殺先自斷其首殺盡始安居死水不藏龍會淂亇中意當甚破草鞋鐵船水上浮拍膝云可憐謝三郎月下自搖櫓翌日上堂安居結制取聲安置篋中克期取證吹網欲令氣滿阿呵扇子𨁝跳上三十三天𡎺帝釋鼻孔東海鯉魚打一棒雨似盆傾濕𨚫西天那蘭陀寺戒賢論師袈裟角它抖擻衣𭁡整威儀合掌云慚愧慚愧海東扶桑國裏小長老開口出粥飯氣大禪卓主丈云諦觀法王法法王法如是五月旦上堂欲知佛性義當觀時節因緣時節既至其理自彰如何是彰底之理如何是時節因緣良久霏梅雨灑危層五月山房冷似氷中夏上堂前半夏前三三後半夏後三三安居清衆直下罷參阿呵笑倒西天老瞿曇七月旦上堂絶頂新秋寒螿泣露聲前句子側耳差悮諸人若也會淂許你霄獨步解夏小參驅耕夫之牛和𭰖合水奪飢人之食果州𩚄布金峰一夏更無嶮機絶境人參究只有茶淡飯大家聚頭喫了你來問吾便和南不敢錯誤諸人一絲毫許雖然如是不許夜行何也寶山路滑上堂此亇㕝沒端倪向上向下全提半提金寶門下猶隔雲𭰖不論半滿不涉高低撫膝云到頭霜夜月任運落前溪中秋上堂中秋節誰共看馬師父子𮞏相熱瞞機前拂袖南泉老月下雲開光轉寒𭁡住淨智語終普中夏普僧問前半夏已往後半夏未來正當今日願聞提唱師云間觸著恆山蛇進云恁麼則高低普應前後無差師云臂長衫袖短進云記得僧問百丈如何是竒特事丈云獨坐大雄峰意旨如何師云莫垜跟進云僧禮拜丈便打端的也無師云藍田射進云忽有人問和尚如何是竒特事且作麼生對師云有口堪喫飯進云爭奈學人無處展拜何師云殺人可恕無禮難容問時候如流九夏過半跟下事請師一次師云六月不熱五谷不𤍨進云從上佛祖提掇不起今日當陽七花八裂師舉拂子問昔日臨濟和尚示衆云赤肉團上有一無位真人常在諸人面門出入未證據者看此意如何師云換却你眼睛進云時有僧出問如何是無位真人濟擒住云道道是何道理師云逼生蠶作進云僧擬議濟拓開云無位真人是何乾屎橛作麼生領略師云覆水難收進云後來岩頭聞得不覺吐舌意在那裏師云招禍上身進云雪峰云臨濟似白拈賊若何甄別師云雪峰還是普州人進云如二大老恁麼道還與臨濟老人有相見分也無師云一畒之地三蛇九𣆨僧禮拜師乃云今夏東山集大成土匏金石皎如明少林一曲八音外十聖三賢側耳驚所以道釋迦勒猶是它奴德山臨濟退後有分自餘間佛間祖三千里外斫額然雖如是不是冤家不聚頭今夏同門法眷方外道友不期而來不約而集眉毛厮結鼻孔厮拄山野薄祐住山于道無取茲者𠇩荷諸公輔弼保社山中無㕝過了半夏今日無端東語西話佛鑑師翁曰蓋普須是法性寬波瀾闊還它前輩大珠南陽德山臨濟岩頭羅山後來圎悟大慧應庵近來亦少雖然雲月是同溪山各異大底有大底生涯小底有小底活計山僧不覺得便冝處落便冝矧此界他方山河大地日月星辰明暗色空破糞箕禿苕一放大光明出廣長舌無前無後一時了也所謂橫竪顯密橫無礙剎衆生三𠀍一切若一草若一木不不得名為普恁麼得猶未涉山僧一咳嗽在還會麼其或未然直須具高識遠見擇善友師門放下復子急參透光隂倐忽二鼠侵藤一息不來異𠀍他生不覺一入驢胎馬腹去不知何劫出頭來可畏可畏所以古德為此㕝孜切晝參夜參竪起脊梁忘餐廢寢豈不見臨濟慧照禪師幼負出塵之志及落髮進具便慕禪宗初在黃檗會中三年不出僧堂行業純一時睦州為第一座乃問上座在這裏多少時濟曰三年曰曾參問否濟曰不曾參不知問亇甚麼州曰何不問堂頭和尚如何是佛法的大意驅羊入屠門濟便去問赤躰挨白創問聲未絶檗便打果然濟下來州云問話作麼生濟曰某甲問聲未絶和尚便打某甲不會最親州曰但更去問且要鈍鐵𭁡入紅爐濟又問檗又打如是三度問三度被打禹門三級嶮濟白州曰早承激勸問法纍蒙賜棒自恨障緣不領深旨今且辝去捨父逃逝州曰汝若去須辝和尚了去忠告而導州先到黃檗處曰問話上坐雖是後生却甚竒特和尚方便接它已後為一株大樹覆蔭天下人去識人還它蒲鞋眼正睦州生時紅光滿室祥雲蓋空旬日方散日有重瞳面列七星持戒精嚴學通三藏遊方印心于斷際激勸臨濟參黃檗接淂雲門嗣雪峰雲門臨濟兩宗皆此老扶竪也故諸方歸慕陳尊宿亦皈鄉掩關織蒲鞋以養母故有陳蒲鞋之號濟來日辭黃檗曰不須他去往高安灘頭參大愚必為汝破韓信背水濟到大愚曰甚處來濟曰黃檗來愚曰黃檗有何言句濟曰某甲三度問佛法的大意三度被打家醜外揚不知某甲有過無過自屎不覺臭愚曰黃檗麼老婆心切為汝得徹困更來這裏問有過無過鳳林吒之濟于言下大悟勵聲曰元來黃檗佛法無多子因地倒者因地起愚搊住曰這尿床鬼子適來道有過無過如今却道黃檗佛法無多子你見箇甚麼道理速道速道勾賊破家濟于大愚𦚰下築三拳虎子未絶乳已有食牛氣愚拓開曰汝師黃檗非干我㕝古人相讓如是與今時貪嗣香底實霄壤也溈山舉問𠇩山臨濟淂大愚力淂黃檗力𠇩曰非但騎頭亦把尾是精識精濟辭大愚却回黃檗檗見便問這漢來去有甚了期三日不相見莫作舊時看濟曰為老婆心切出囚口便人事了侍立檗問甚處去來濟曰昨蒙和尚慈旨參大愚去來檗曰大愚有何言句濟舉前話檗曰大愚老漢饒舌待來痛與一頓隔靴抓癢濟曰甚待來即今便打隨後便掌冤有頭債有主檗曰這風顛漢來這裏捋濟便喝閃電未收轟霹靂檗喚侍者曰引這風顛漢參堂去把斷要津莫輕放過濟住後曰夫為法者不避喪身失命我黃檗先師處三度問佛法的大意三度被打六十痛棒如蒿枝拂相似諸人還知痛癢麼直饒黃檗通身是手棒如雨點臨濟若非求道之志遠大焉能有淂徹證時節直饒臨濟有遠大之志不出僧堂黃檗若非下𢙣辣手假你空向黑山鬼窟賺過一生所謂具高識遠見擇善友師門是也濟栽松次檗曰深山裏栽許多柖作甚麼濟曰一山門境致二後人作標榜道了將钁𡎺地三下檗曰雖然如是子已喫吾三十棒了也濟又𡎺地三下噓一噓檗曰吾宗到汝大興于𠀍見子莫若父濟果住鎮州臨濟建立黃檗宗旨學似雲集普化克符二道者為股肱法道振一時示衆大凡演唱宗乘一句中須具三玄門一玄門須具三要有權有實有照有用汝諸人作麼生會即有三玄三要四料簡四賔主四喝四照用許多間絡索大法未明滯在一途一轍底窺藩籬乎又有一頌大道絶同任向西東石火不及電光罔通只者一頌子即是殺人刀活人劒耳若能提得德山末後句香嚴獨腳頌雲門法身兩般病洞山三種滲漏以至東山牛過窗櫺話一舉即可點破具眼者辨取夫南嶽青原兩𣲖雖分五家臨濟正宗輝騰千古光明照人兒孫滿寰海未寂寥矣豈非源深流長乎已為他兒孫可不辱先祖啞今時學者𭰖文字義句埋沒自己本明不見黃梅七百人龍象衆中唯有亇不識字漢得衣法五家七宗宗𣲖皆從曹溪一𣲖出有甚間工夫管他之乎者也况百家異學如山嶽之高瀛浡之深一生兩生若為盡之夫子為万𠀍之師集三聖之事而為一大聖之事亦道吾猶及史之闕文也你持蠡海一場困苦參可之士直須屏去所習專一研究苐一莫執迷待悟明暗兩岐染淨二邊左來也不是右來也不是通身無所安時肚裏七上八下時切忌臨崖而退万仞懸崖撒兩手放捨性命絶後𭁡蘇百尺竿頭進一步豁開活眼全躰現成三界二十五有當下平沉八万四千塵勞隨處解脫從前作礙作障底文字語言𭁡抱來橫拈倒用如龍得水似靠山風颯二地電激雷轟有時鞭䇿衲僧有時號令佛祖黃檗臨濟退後吐舌不亦快哉濟半夏上黃檗山胡蜂不戀舊時窠見檗看經曰我將謂是亇人元來唵黑豆老和尚錯證羊了也住數日乃辝檗曰汝破夏來何不終夏去靈木迢然鳳不依倚濟曰某甲暫來禮拜和尚仁義道中不無你檗便打趁令去劈開華嶽放出黃河濟行數里疑此事却回終夏識法者懼雲岩半夏無人上山因甚今日納敗闕良久云六月賣風人間恐無價喝一喝普終法語示石侍者上來的相承底非隂界中事眼相對間不容髮大抵煆聖凡烹佛祖大爐鞴𢙣鉗鎚斷要生鐵鑄就脫體荷擔不見克賔維那在興化會中喫棒趕出院意在那裏克賔因甚還承嗣它小𭃯今夏堂司欠人因虔請石侍者充之殊無難色每扣籌室法戰機不讓山僧雖不行興化令秋風吹衣忽皈舊隱不能攔之俊如秋鷹方振揚快如駿駒絶超放是吾家真種草也切祝隨處流通法道應緣接續正宗至囑示元侍者我有一句子威音已前兩手分付了也洎至踏步向前袖需語便道我宗無語句亦無一法人于是透得兩重關鐵壁銀山一笑摧威音已前消息即今歷現前有時在孤峰頂上與人相逢卻向十字街頭握手有時在十字街頭人相逢卻向孤峰頂上握手一切處一切時淨倮活鱍恁麼履踐始終不變以至臨死生禍福之際全是自家受用底時節也換身移步豈涉遲疑乎元侍者志道不群氣宇軒昂望他時異日大興法道去也至禱示在侍者英靈衲子氣吞佛祖當頭一不近人情昔守廓侍者辭興化參德山問從上諸聖向甚麼處去山曰作麼作麼廓曰敕點飛龍馬跛鱉出頭來山便休去山來日出浴廓過茶山山接得撫廓背一下曰昨日公案作麼生廓曰者老漢今日方始瞥地山又休去廓侍者臨陳揮劒冷光閃爍若非德山暗設機穽平地厮陷幾乎被打破蔡州在侍者今欲下山參遍諸方切忌踏它覆轍直須未舉一步前勘破天下老漢了其或不然未免向它家虀甕裏淹殺示寒河照源大師此事不論男之與女僧之與俗唯一念超證千聖立在下風所以末山接得灌溪揚逆水波龍女勘破鶖子雷轟風馳雖然只如一人道不是神不是鬼變亇什麼一人忽然之間變成男子坐寶蓮華成正覺是一是二直下自能破末山龍女隱身無路示湛然居士威音已前有超卓處即今一念超證遍界不藏脫體現成不分𠀍法佛法直下打成一片若能如是則居忠孝仁義源現宰官身合元亨利貞德輔君撫民終日作為圎湛虛凝體不動終宵寂默展縮殺活用不廢恁麼信得及恁麼行履去一切處一切時淨倮活鱍以至洎生死之際渾是自家受用底時節也豈不見普現居士入圎悟室一日早朝回到天津橋上馬躍忽有省直造天寧悟適出門遙見喚云居士且喜大事了畢士厲聲云和尚眼花作麼悟便喝士亦喝于是機鋒迅捷一日微恙忽索湯沐浴畢遂趺坐化偈云謾從來牧護今日分明呈露虗空拶倒須甚向上一路擲筆而逝是則平生學道靈驗末後得力光明也公只恁麼參取示禪人學道之要無他只在退步就己若能辨鐵石心立決㝎志廢寢忘餐專確體究萬不失一也况這一假事人本有底混沌未分該括萬有纖塵不動含吐十虛一切處一切時淨倮活鱍才擬趣向便是千里萬里沒交涉到者裏英俊底直須超然獨脫不見雪峰知鼓山緣熟一日驀胸擒住曰是甚麼山釋然了悟了心便忘唯微笑舉手搖曳而已雪峰曰子作道理耶鼓山復搖手曰和尚何道理之有峰便休去此是本分參禪樣子也古人于了悟時了心猶忘况于𠀍間種種雜念狂妄馳求之心乎公還承當得麼只者未承當底復是亇甚麼忽然識得落處雪峰鼓山却向你背後叉手示禪人示諭從辝座下杳阻面話願淂一語以為警䇿不見古人道契則霄壤共處趣異則覿面楚越公若廓然契悟則雖在數百里外何隔一絲毫乎矧及至大道絶同不千聖并立直得孤逈峭巍萬化千變風行草偃公如是信得及豈非暢快平生乎勉旃勉旃示禪人道人日用㕝如白日青天脫體現成遍界不藏全佛法是𠀍法全𠀍法是佛法八面玲瓏無絲毫障礙處若能如是雖在塵勞中而不被塵勞之所染污雖在福貴中而不被福貴之所羅籠如蓮華不水也才起佛見生𠀍間想當面蹉過了也所謂一種不通兩處失功只要胸次廓然不留纖末內忘己見外泯諸相萬端千緒打成一片儻根浮腳淺猶觸途成滯被目前万境所轉作麼生透脫生死牢關去切須不捨晝夜孜矻退步體究忽然到大休歇大安樂之場始知法喜禪恱之樂非𠀍間之樂可比然此樂無受者平一如混融無際便能處無為事行不言化流通正宗救末運弊豈非報佛祖深恩耶示禪人挺特沒量漢卓然超佛祖坐臥色堆頭不一法作對更須移步換身一句全提八面受敵絶物而照先機而轉才凝神澄念墮在死水裏直須無邉剎海風颯地雷轟電激變化無滯始得其或未然龍門嶮處點額曝腮所以雲門大師云盡乾坤大地無絲毫過患猶是轉句不見一色始是半提須知有全提時莭鞭䇿佛祖號令衲僧只在全提時莭耳既存它種草切莫碌小了示禪人學道人胸襟未只在偷心未死盡直須向極微細處𣣔起未起猛精彩看忽然脫體現成遍界不藏遍不藏處千眼也難窺有時石女腰邉截兔角有時鐵牛背上刮龜毛不存竒特殊勝不墮平常無㕝恁麼履踐始終不變万年一念一念万年以至臨死生禍福之際全是自家受用底時節豈涉遲疑乎示壽山講師我宗無語句更不立階梯坐斷報化佛頭高踏毗盧頂上所以道釋迦勒猶是他奴至竟他是阿誰壽山若也點頭去山僧咬定牙關何也許由洗耳巢父牽牛法語終頌古即心即佛一𫨻光明天真自得皓玉無瑕雕文喪德非心非佛非佛非心豈易聞暮風吹斷碧溪雲虛堂永夜月為晝羽角可慙龍鳳群馬祖升堂百丈捲席向上那一路師資全不顧月上孤頂寒霧卷岩露𡸁絲千尺意在深潭離鈎三寸子何不道蛟龍何必貪香餌隨例漁翁拋釣來跳過禹門三級浪任他平地鼓風雷百丈耳聾黃蘗吐舌三日耳聾誰委得退身吐舌只麼來馬師一喝乾坤暗轟起一聲燒尾雷明招謙禪師暖處商量不謬明招獨眼龍雷聲一起電相千山雨過添新碧花放巖朵朵紅佛祖釋迦本來無影像丈六紫金身不動瑤華座全身現剎塵觀音悲願海深楊柳繫春圓通門戶巨闢塵塵佛光為石侍者請大唐撾鼓扶桑升堂白拈手𫨻意在當陽咦有破家子證蜂桶羊自為石侍者脕體無依𡋐斷寰宇黑漆竹篦號令佛祖石侍者點首轉圓石于千仞付鈯斧于兩手為玉林居士掣電之機風雷之舌開盡三冬枯木花誰看九夏寒巖雪咦石霜之下有張拙無靣目漢誰見其端潮落海岩露雲收天宇峭峻門不立階梯啞禹力不到處河勢流向西坐斷乾坤殺活當機擬問如何雪創橫飛正和五年丙辰十月草日丑刻書偈坐化云坐脫立亡平地骨堆虛空筋斗剎海動風雷喝一喝徑山老圓照室中皆麟角鳳觜間出無學一人大似無毛鐵鷂宿鷺亭前扶桑國裏石火莫及電光罔通産下三足金烏飛上東山雲岩高高峯頂羅籠不住呼喚不回最初斷命刀子便自倒行逆施沒蹤迹處莫藏身重遭捉敗夜半正明天曉不露吹滅銀燭未露爪牙等間撞倒巨福山官馬厮踢甚慿據雲岩高峯佛國禪師機緣問答天岸廣首座請序泰定三年丙寅春二月三日前雞足山比丘清拙正澄拜書住下野州東山雲巖禪寺高峯和尚勑諡佛國禪師問答參學比丘慧廣編師始𠀍良田長樂寺見無學和尚勑諡佛光禪師問曰從來佛祖如冤家今朝覿靣難回避不顧放身捨命處請師下斷命手腳光云斷命刀子在你手裏師曰吹毛元不動遍地是髑髏光云間葛藤便問夾山云𡸁絲千尺意在深潭離鈎三寸子何不道近處下一轉語師曰龍門真躍鱗不隨漁人手光云你因什麼在醋甕裏身師振威一喝光云絲懸淥水浮定有無作麼生分賔主師曰一吸滄溟乾光云船子末後付夾山云藏身處沒迹無迹處莫藏身作麼生師曰敗闕不少光云賞你大膽放三十棒師曰爭奈棒頭在學人手裏光云回這棒頭打東福和尚師曰祖不了殃及孫師嘗受業東福和尚又一日因入室光問云馬祖升堂百丈捲席意旨如何師曰一狀領過光云你因什麼向老僧鉢盂裏洗浴師曰和尚鉢盂百雜碎光呵呵大笑云也得也得光自福山致書求平日述作師以偈答曰一見明師意轉間癡憨終日坐煙巒飽柴飽水無餘事禪道文章何處安師後福山一日光謂師云你但來呼老漢足矣何必有重賞使我不安師曰某甲特來禮拜和尚更不採一莖菜不費一粒米供養和尚去光云老漢老貪承供養鼻下一坃深万丈橫吞羅漢竪吞佛却道今日欠鹽醬師舉拳曰只這一箇吞吐不下師云汝當拈出老漢退身有分若是東山下烏藤更喫五頓師打光一拳光呵呵大笑一日因遊山光問云開口因甚不在舌頭上師吐舌曰果然出廣長舌光云家法不如此師曰待肯作麼光云注解不成禪師振威一喝光云試分賔主看師曰今日相見光云我不識你師拂袖去光喚云且來師歸來云適來方丈裏喫茶了光云汝只可借路去不可借路來師曰步步無迹光云老僧要汝出草師曰山頂澗底一見便見光云一生如此他日有悔在師曰慶快平生是今日孰云千里賺吾來光云吾當為汝助喜雖然如是靈禽自惜羽毛師曰謝和尚老婆心切光云付授之際不可草草即作一偈莫怪吾多事楊花落也驚三十年後去擲地作金聲師便禮拜光謂師曰我要你在此伴我三兩月老懷方快活師曰雖然爭如䇿杖歸山去長嘯一聲煙霧深光云非此謂也我年老心孤要真正知心暖我懷抱也夜話之次光謂師曰東山戲幾日老漢要你細談話在一回相見千難万難此事造次不得師曰某日夕不欲離和尚左右只恐雲山無主人伏乞今宵示火爐頭話光云一棒一喝擊石火閃電光容易若是佛祖綿密處須是透得圓熟七出八沒處如十鏡十燈光光相照光光不礙斯為妙也師曰万象森羅一毛頭上十方三世一彈指間光云若如是你行此路不妨亦要有變他頭靣各別為宗匠師曰是龍上天是蛇入草光云須當如大鈞播物不可局于一枝師曰七手八神頭鬼靣光云好好便將衣法俱付了云千万為佛法接人師受法衣云何處不稱尊師一日看真如録光謂云長老看老僧拙作中間頭靣不同出沒非一不可以實迹求此名虛玄大道無真宗臨濟的的相承自古自今千万人中只求一人半人髣髣佛佛者無限的的到地頭者難其人冝細細涵泳且虛心為第一嵗久月深自有不思議之妙矣師曰虛玄大道無真宗那邊撒手任向西東光云一切不存是臨濟宗千差万別莫不朝東師曰禹力不到處河聲流向西光云汝雖如此老僧猶有話在師曰不勘自敗光云放汝一線道光因夜話之次問云夜半正明天曉不露長老作麼生聲未了師吹滅燭光云長老却是一箇大蟲師曰爪牙未露在光云老僧年邁師曰請和尚眠去光云伏惟安置無學元和尚載道而東流通洋洋焉東溟共主皓皓乎旭日爭明今觀其嗣子高峯日和尚印心傳器之際披肝瀝膽劈腸𭃰心一唱一酬一啐一機機的破的大似轉圓石于千仞之上走明珠于一柈之中芥輥針投了無凝滯灼然擲地金聲何待三十年後若曰玄大道無真宗臨濟的的相承豈有今日所一山寧和尚一挨一拶嗔拳互舉熱血相噴此又不可以言意求之泰定三祀丙寅嵗端月既日禾城本覺靈石如芝書佛祖大事腳跟下洞明本分人相見一抑一揚無非揭示箇一子直是毫髮無間所謂臨機不讓師也無學和尚得先徑山圓照之旨潛鞭熟鍊極妙窮玄如善舞太阿無不中其矩度今觀佛國高峯長老問答橫箭鋒相直有如老東山山之與南堂説細大法門殊無少異但當時舉子胡看狗話必欲結南堂之舌而使自己亦無咽唾處為百了千當不知高峯到此果能心死路絶否其徒廣首座出此録為示為題其後時泰定三年三月初五日金陵鳳臺住山清茂題師一日相訪一山和尚山問云和尚在東山尋常以何示徒師曰洞中山色四時好雲外溪聲一樣寒山云莫是瞎時人眼麼師曰正法眼藏增高價山便喝師連喝兩喝喫茶之次山又問云水牯牛水草甘麼師曰飽臥斜陽不去山云猶欠痛鞭在師作吼勢傾頭撞倒山山呵呵大笑
