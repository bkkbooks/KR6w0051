body:
  text: 住相州淨妙禪寺語錄侍者玄仁編山門大解脫門誰能入作八字打開全无肯路新長老汝通一線驟步而入佛殿佛休許由洗耳巢父牽牛囙甚踏步向前插香云不是冤家不聚頭㨿室撗拈主丈云商君法孫武令全提時節佛祖𠧒命顧視左右莫有向這裏出氣底麼良久吽拈帖振興佛法聳動人天把定放行全在裏許未證㨿底拈起帖云看山門䟽相唾饒你潑水相罵饒你接觜何也大家在這裏諸山䟽貶我銕綿團褒我錦包特石箇中親切一句子生銕蒺䔧當靣擲法座機不離位墮在毒海驟步登座云湏燈王不知所在祝香罷又拈香云此香颺在寒岩谷皮膚脫落尽久矣今日无端重生枝未免拈出供養圓覺開山諡佛光禪師無學大和尚用酬法乳之㤙就座索話云一句子在機先眨得眼來十万八千莫有向那邊點頭底麼問荅不錄乃云翠竇煙岩蔵醜拙臥雲眠月謝塵寰天網難回避不覺全身入虎関便見不寸刃折衝千里地靈人傑坐致太平幸自清平𠀍界何必禪論道直饒棒如雨點喝似雷奔且請束之高閣雖然如是𠀍界未形生佛未具已前驀拈主丈卓一下云還識有這一著子麼若識得去許汝天下橫行把定則黃頭碧眼飲氣吞聲放行則蝦蟆蚯蚓動地放光不把定不放行堪報不報之㤙用助无為之化正恁麼時且道功歸何𩂜良久天上有星皆拱北人間無水不朝東舉法燈示眾云本欲深蔵岩岳隐遁過時奈何清凉先師有未了底公案未免出來它了卻時有僧出問如何是未了公案燈打云祖禰不了殃及兒孫拈云法燈訐以為直者僧招禍上身檢點將來何曾了卻新淨妙本欲深蔵岩岳隐遁過時奈何佛光先師有未了公案未免出來他了卻若有人出來道如何是未了公案只向他道低聲何故子為父隐直在其中當晚小參索話云荅不荅垜生招箭賔主機先如何相見問荅不錄師乃拈主丈云文殊三處度夏歷相六國未是良謀思大目視雲霄餓死首陽豈為奇䇿衲僧家把不定掣断金鎻撥轉玄関或卷或舒乍彼乍此况日上座三十餘年在孤峰頂上人相逢卻向十字街頭握手即今在十字街頭人相逢卻向孤峯頂上握手不是革轍通途亦非隨鄉入俗無古無今無延無促阿呵断絃湏是鸞膠續卓一下復舉藥山和尚小參示眾云有一句子待特牛生兒卻向汝道時有僧出云特牛生兒也請和尚道山云將火來僧抽身歸眾拈云藥山暗裏投明珠者僧卻下九重淵爭奈主賔當靣蹉過大眾要知藥山誵訛處麼不勘自敗中秋上堂中秋節許誰知寒山子錯題詩啞新月有圓夜人心無滿時淨妙語錄終金寳山淨智禪寺語錄侍者妙康編指三門云痛棒𤍠喝撼動乾坤佛祖難入作一踏云樊噲踏鴻門佛殿千輻輪踏地無見頂撑天既是無見頂目前是什麼插香云杖林山下竹根鞭便礼拜據室摩竭掩室毗耶杜口喝一喝猛虎不餐伏肉便起拈帖把定封疆號令佛祖只這一著文彩未露見麼舉起帖云公驗分明山門䟽金峯万仞立處孤危放開一線還落便冝啞誣人之罪以罪加之法座坐断毗盧頂底猶墮這一座中驟步登座云看看鳳栖不在梧桐祝香罷就座索話𮈔綸千尺意在巨鰲三山連一掣任聽浪頭高僧問一佛出𠀍天垂寳盖地湧金蓮和尚出𠀍有何祥瑞師云三冬枯木花進云祝聖一句又作麼生師云海晏河清進云恁麼則四海浪平龍睡九天雲靜鶴飛高師云時清不用唱巴歌進云記得三聖道吾逢人則出則不為人意在那裏師云用尽自己心笑破它人口進云既出囙甚不為人師云一手搦一手擡進云興化道吾逢人則不出則便為人意𣅀作麼生師云敗不少進云既是逢人囙甚不出師云不同門外遊人進云可謂二老同途不同轍和尚別有為人處也無師云生銕蒺䔧當靣擲進云若不上來伸此問焉知滄海有明珠師云百雜碎又有僧出問昔日閩王送羅山入院山纔登座重便下座意在那裏師云五更侵早起更有夜行人進云王把山手云今日一會何異靈山還端的也無師云今古應無墜分明在目前進云只如大檀越台斾親送和尚入院未審有何𭤸設師云馨香滿道途進云恁麼則非但正法眼蔵增高價靈山一會儼然未散師云金色頭陀笑點頭進云昔日羅山今日和尚師云眼相對僧礼拜師乃云淨智妙圓杲日麗天體自空寂左轉右旋昨日乾明主人今朝金峯長老在彼在此本无間然便見无邊剎海不隔毫端一切處莊嚴一切智成就人人眼空宇宙箇氣吞佛祖何也猛將之下無劣兵復舉雪竇明覺大師一日李殿撰坐次有一秀才一道士從外入來撰云三教之中那教㝡貴雪竇起身側立撰云有口何不道竇云對夫子難言師云雪竇通身是口記已了也囙甚𨚫道對夫子難言良久碁逢敵手難蔵行一著還它一著高當晚小參拈主丈云一句子左邊卓一下云出扵千佛頂上一句子右邊卓一下云豁開無尽寳蔵臨濟三玄曹洞五位溈仰圓相法眼綱宗中間卓一下云渾從這裏流出了也各自分疆列界到處稱尊若到明眼人前只得一場好笑只如𠀍界未形生佛未具時多少閑絡索安在什麼處又卓一下云天高群象正海闊百川朝復舉德山小參示眾今夜不荅話問話者三十棒太平寰宇動干戈時有僧出赤體挨白刃山便打瞎棒作麼僧云某甲話未問在更深猶自可午後使人愁山云汝是甚處人來處也不辨僧云新羅人果然猶隔海在山云未跨船舷好三十棒猶較些子然雖如是還知這僧未離新羅已前已勘破德山處麼那裏是佗勘破處具眼者辨取閏臘月旦上堂拈主丈云臘又臘寒㝡寒霜風凜凍破泥團少處添多處減會麼卓一下云三年一閏除夜小參拈主丈云末後一句把断要津卓一下云放開一線万國逢春直得處清茶談話家濁酒狂歌三三兩兩靣靣且道即今喚作旧年也即是喚作新歲也即是若作新歲臘月未尽若作旧年已是逢春主丈子試代諸人断看卓一下云秤鎚渾是銕舉僧問趙州如何是不遷義州以手作流水勢其僧有省拈云老趙州通身是口皮樿无截流機此僧雖然省悟爭奈摩斯落水喝一喝正旦上堂无隂陽地風月斬新卓主丈云踈影橫斜岩下水暗香浮動劫壺春上元上堂一𫨻光明十虚照徹不是人間燈亦非天上月還有回光返照底麼默照邪禪徒偷心未死尽卻道不昧靈臺不是瞻視光影啞夜深老鼠上燈臺佛涅槃上堂記得𠀍尊臨入涅槃文殊大士請佛再轉法輪𠀍尊咄云文殊吾四十九年未曾一字汝請吾再轉法輪是吾曾轉法輪耶大眾還會瞿曇末後句麼良久鯨吞海水尽露出瑚枝三月旦上堂聞聲悟道見色明心客遊三月鸎囀千林擔板禪和癡兀坐䆫前任聽落花深結夏上堂三期行甚清絕內外一如身心寂滅金寳一會眾生涯還自別別別三冬枯木花九夏寒岩雪上堂行亦禪坐亦禪劒去久矣誰刻船目前无法意在目前不是目前法會麼翡翠踏荷雨鷺鶿衝破竹林煙端午上堂五月五天中節万戶千門書符捏訣金寳一味癡頑何也家无白澤之圖豈有如是妖孽中夏上堂前半夏不將後半夏不迎只愛寥夏日長青扇子足風凉遠山雨過對斜陽解夏上堂九夏賞勞絕毫絕𨤲天機漏泄月冷風高靈利漢剔起便行主丈頭穿過列祖鼻孔草鞋尖踢出諸佛眼睛然雖如是向道莫行山下路果然猿呌断腸聲九月旦上堂摩騰入漢太平寰宇卻招乱達磨西來无端平地起波瀾金寳今日又作麼生万里片雲収秋高爽氣浮退院上堂已歷朞年住寳峰了无一法玷門風杖頭更有乾坤闊隨處何妨祝聖躬淨智語錄終住相州巨福山建長禪寺語錄侍者玄挺妙環編指三門云廣大樓閣峭峻門撥轉関捩拔楔抽釘喝任佗平地皷雷霆佛殿無佛処獨尊主賔誰共伱論分身千百億水出自高源土地顯應靈聡明智鑑微扵三際察秋毫扵萬里不是是非眼何曾墮一臂祖師二三四七此土西天直𢫾如何指單傳作麼傳咦誰識鵉膠續断絃拠室拈主丈云囊砂背水殺活臨機橫按丈云大眾退後隐乎坐重圍拈帖閫外令句中眼点則不到則不点衲僧家呼喚不囬一走千里囙甚被一印住举帖云公驗分明在手裏山門䟽是自家屋裏底那容家醜外边揚掩之不可得一任錯商量諸山䟽精識精賊知賊就中不許邏贓人臨済未是白拈賊江湖䟽一襃一貶互相塗糊其甘如萕其苦如荼啞𢙣声此滿江湖法座湏灯王佛和座子敗闕當頭坐断虚空迸裂祝聖罷復拈香云𠃵坤未剖根地實不假海岸激射之熏烈何用南蛮舶主之資質清香難掩不免輕拈出𤍽向炉中供養前住當山開山圎覺東山第八𠀍𠡠諡佛光禪師無斈大和尚不是報㤙只要酧冤遂趺座云門躍鱗幾遭点額透過三級試呈頭角僧問掣開金殿鎖撞動玉樓鍾猊座高登請師祝聖師云独角麒麟登海屿進云恁麼則非唯佛日增光一片皇風浩蕩春師云九天雲靜封疆闊進云只如大檀越請和尚開堂演法未審演亇何法師云杲日當空進云人天交接兩淂相見今日一會何異靈山師云今古應無墮分明在目前進云記得法灯禪師新入院對眾云本𣣔深藏岩岳隐遁過時爭奈清涼先師有未了囙緣出来他了卻意𣅀如何師云用尽自己心笑破它人口進云法灯果然為它了卻得也未師云證蜂桶羊進云心外无法滿目青山喚什麼作清凉未了底囙緣師云抱贓呌屈進云和尚今日出来應亇時節佛光先師還有未了囙緣也無師云子為父隐進云出則便為人何妨為它了卻普應群機師云虚空背上白毛生進云不囙台命起岩隐爭得人天聞未聞師云何不把禪床靠倒進云金毛師子方哮吼一時走散野干鳴師云利劒拂開天地靜進云手裏春風閑不淂又来溪上種桃花師云馨香滿道途僧礼拜師乃云大機独運卷舒立方外𠃵坤大用全彰橫掛域中日月双明又双暗全放又全收日上座平生枯禪窮山有口挂壁未曾道著元字脚將謂𠦡自可怜生今日无端被業風飄轉未免應亇時節略露風䂓雖然不是目前機亦非心外法門頭柖檜不壓而滴翠屋後池水不挼而湛藍只如大檀越台斾入山令山僧為囯開坣演法報㤙酧悳一句作麼生道卓丈一下云華岳連天秀黃河徹底清復㪯僧問百丈如何是奇特事丈云独坐大雄峰僧礼拜丈便打師云尽道者僧礼拜爛泥有刺百丈便打𠋣勢欺人未免管中窺豹顧視左右云必竟知它落処麼良久重賞之下有勇夫當晚小參靈山百万眾迦独破顏少室九秊後神光冷眼看撿点将来雄雞生鵠𡖉以至徳山僻執趙州圎轉不勘自敗劈口便𡎺自餘閑佛閑祖尽天下老凍儂向什麼処出氣去也山僧今夜小參只得咬㝎定牙関忽有亇漢衝眾出来道新長老未知門限高低鍋子大小囙甚得恁麼口吧地啞前汗馬无人識只要重論盖代功㪯僧問趙州如何是道州云墻外底僧云不問這亇道州云問那亇道僧云大道州云大道透長安山僧有亇道処試㪯似大眾来大道無方所底㕝趙州皷口唇紫陌紅塵飛不到月明照見夜行人上堂有運斤手誰能就斵空手相逢不放過當機抝折驪角坐觀成敗時節主山高案山低若作主賔人境會鷓鴣飛過落花溪接官府宣望闕謝㤙一幅天書来日邊九重和氣滿山川扶桑万里無雲処仰祝聖明千万秊便見祖道興振王道平稽首九首傾心志心臣僧顕日下情无任感天荷聖激切屏營之至拈勅黃云諸人還會麼王言如絲其出如綸就座拈香此一瓣香恭為祝延今上皇帝聖壽無疆恭願天清地泰九垓永佐皇圖時和年豐万邦尽皈聖悳遂趺坐云風恬浪靜老龍眠驪珠不惜誰下九渕問荅不錄乃云太平无象君聖臣直君臣道合方彰盛徳爰知昔受灵山記曾乗大願力興建大廈高坣呈露壯麗嚴飾綿亘十方綸八極看交接百億人天聳動無邊佛國以何為驗良久我皇有勑臣僧顕日恭奉特賜聖𣅀榮寵當山領眾迎接永鎮山門㳙耴良辰陞于此座㪯揚正法眼蔵仰祝聖壽無疆上感聖㤙上感聖㤙復拈主丈說偈云遠頌聖澤布堯仁古佛塲中瑞氣新將底酧㤙崇筭大椿八千春浴佛上堂举藥山和尚囙遵布衲浴佛山云這亇伱浴那亇還浴淂麼遵云把将那亇来山便休師云布衲橫機不讓好一拶藥山便休老不以筋力為能福山不問這亇那亇以手作浴佛勢云當頭一拶難囬避便下座結制小參拈主丈云若能知有還成窠臼剔起便行外邊乱走直饒超過威音已前猶向老僧背後义手矧復克期限護聖制不知刻舟劒去已久雖然汝若證龜成鱉我便𢫾槐罵柳伱若把楚雞為鳳我便喚師子為狗阿呵卓丈一下驚起法身蔵北斗举僧問汾陽如何是祖師西来意荅云青扇子足風涼師云汾陽陳年破扇子高閣架頭不足用福山當斯聖制不妨漏泄天機祖意明休借問青扇子不同參三更孤月断雲外一皷薰風到自南翌日上坣古佛真宗列祖家風特摽象外捏㝎寰中甚禁足護生猛虎當途遇物則噬論甚克期修證接竹点月掘地覔天福山這裏全無縫𦉑鶻眼鷹睛窺覻无門如是安居如是結制喚作唯除頓覚人并法不随順底得麼良久百匝千里俱粉碎𠋣天長劒逼人寒謝秉拂上坣四貟頭首全賔全主照用同時杲日當手殃𡧱天下衲僧号令上佛祖只者一拂柄入手裏一拂云撼動寰宇山岳起舞重五上堂万病灵藥一莖瑞草扁鵲未知耆婆難討即今山僧現成受用去也卓丈一下直得一切抱病者神清氣爽息𢙉阿呵喚起毗耶癡愛老上堂目前无法意在目前絕毫絕𨤲徧地徧天不是目前法非耳目之所到未明三八九難踏古皇道雨濛草茸断碑鐫白字當道種青謝翆蘿東里和尚至上堂遠離翆蘿一朵峰片㠶高掛十分風當陽誰識西来意万里扶桑在海東七月旦上堂拈主丈云一落天下秋一塵起大地收卓一下靠倒嘉州大象驚起陝府銕牛解夏小參僧問節届解制布袋口開九旬賞勞請師提唱師云金雞破琉璃殻玉兔挨開碧海門進云一把香蒭拈未暇六環金錫響遙空莫便是麼師云鷂子過新羅進云記得翆岩示眾云一夏為兄弟話看翠岩眉毛在麼意𣅀如何師云羅公照鏡進云長慶云生也未審具甚眼目師云𦘕成狸進云保福云作賊人心虚又作麼生師云巡人犯夜進云雲門云関聻師云撓鉤搭索進云只如諸大老恁麼道還有優劣也无師云一坑埋却進云白雲尽処是青山行人更在青山外師云重疊関山路僧礼拜師乃云金声玉振集大成一曲兩曲宮商外賞音能幾人衲僧家万機休罷千聖不聞佛一字急洗耳道正囙漱口三日囙甚如是鶴有九皐難翥翼馬無千里漫追風復举岩頭參徳山方跨門便問是凢是聖山便喝頭礼拜有人㪯似洞山山曰若不是奯公大難承當頭聞云洞山老人不識好𢙣錯下名言我當時一手擡一手搦師云悳山有斬蛟劒岩頭具䧟機只如末後道一手擡一手搦又作麼生曙色未分人尽望及乎天曉也尋常中秋上堂以拂子打圎相云人有這亇誰敢正眼看修行供養本分不安拂袖便去何絕攔啞言迹之起太生異端良久今宵不隔千山月無限清光分外寒重九上堂謝建仁約翁和尚全西堂至作家相見意在當陽不用險機絕境不堕無事平常全提一句作麼生商量擊禪床云節届重陽日短夜長上堂謝南首座始蔵主用維那矩侍者至大蔵小蔵一字不三喚三應家私漏泄只如睦州賺臨濟興化打克賔又且如何辨別卓丈一下云打刀湏是邠州銕開炉上坣火炉頭不行令無賔主話䧟機穽照顧眉毛看冷灰發㷔火星迸上堂万機休罷千聖不不用橫竪不用全提半提撫膝云到頭霜夜月任運落前溪圎覺寺掛御書額宸翰爍然文彩彰當陽揭示發祥光大圎斍海莊嚴域從此門風万古昌雲漢騰蛟蟠霄鳳舞鵉翔至尊至貴為瑞為祥銅睛銕眼莫錯商量指額云若也分明薦取許伱独步大方冬夜小參一氣未兆前有㝎𠃵坤句黃面老子三百餘會尽力不出碧眼胡僧九秊面壁到頭覻不透徳山棒頭短臨濟口門窄福山冷地看来依旧晷運推移日南長至然雖如是冬不寒臘後看翌日上坣仲冬嚴寒凍破泥團良久化機消息轉鮎魚上竹竿上堂謝秉拂臨済四料揀當機孰能辨福山門下四頭首与𡙸擒如閃電大眾還要分明會耴麼良久声前句後新羅箭上坣一年十二月一日十二時時時全躰現莫道落便冝雖然如是不是一畨寒徹骨爭得梅花撲鼻香除夜小參年窮歲尽秊窮爆竹声驚破殘臘半宵夢春風処吹起紙錢一堆灰李公酔倒街頭元是張公喫酒若作世諦流布壁上灯大開咲口若作佛法商量坣前露柱未肯点頭退後銕壁銕壁將謂李陵䧟虜誰知樊噲踏鴻門擊禪床一下举僧問香林万頃荒田是誰為主林云看臘月尽師云香林用処天地不仁問福山万頃荒田是誰為主只向他道銕牛耕開刧外春且道福山香林相去多少具眼者辨耴上元上堂從上来沒巴鼻灯相續冷熖未已所謂一灯然百千灯百千燈一灯起唯有潭老一吹吹滅何也我見灯明佛本光瑞如此退院上坣拋離玉殿瓊樓上皈隐煙霞泉石中八臂那吒攔不住囬途石馬出羅建長語錄終再住淨智禪寺語錄侍者妙凖妙環編再住上坣孤䇿當秊下宝峰重来老倒步躘踵滿山風月依前好再面儼然對大雄大眾還會麼良久前汗馬無人識只要重論盖代功謝兩班上堂樷林輔弼之士還湏遠見高識𭓩如天盖地擎翊賛紀綱將仆磨不磷𠔃涅不緇誰言鵉鳳栖枳𣗥結夏小參威音已前无師自悟正眼看来是第二句九旬安㞐十方同聚擬尅期取證討甚閑家具本色衲僧己灵不重大闡提機諸聖不慕忽有亇漢衝眾出来道長老長老未免多少葛藤露布啞鷺鴛衝破竹林煙翡翠踏荷雨復举僧問中雲何山起風何澗生云尽力𭤸為不離中師云中只有受璧之心更无城之意金峰則不然若有僧問雲何山起風何澗生只向它道吟虎嘯謝頭首秉拂上坣龜毛拂子柄入手𡙸擒指槐罵柳雖然四頭首一言未出口還會麼黃絹幼婦外孫臼中夏上堂炎六月蟬声嗚咽全提句子機先漏泄臨済底㕝上黃檗破夏徃還心未歇七月旦上堂落知秋墮第二頭動絃別曲万里崖州趙老放下韶陽六不収良久有意氣時添意不風流処也風流解制小參說到行不到処眉毛有幾莖行到不到時明眼人落井金峰一夏渾崙無縫𦉑論甚麼行到不到到行不到咄万里崖州君自去臨行惆悵佗誰復㪯僧問雲門𣗳凋落時如何門云躰露金風師云雲門老漢未免墮者僧圈繢若有人問金峰𣗳凋落時如何荅云洞中山色四時好雲外溪声一樣寒解制上坣九夏賞勞痛棒熱喝剔起便行眼睛忽活万里煙雲一抹秋鴈行沒処水天闊擲丈下座謝兩班上坣摩訶衍法揮劒太量外之機游刅事海忽尒機輪撥轉天斉力有時金鎚影動古佛𥪰頭參大眾還會麼若也不會問取侍者邉中秋上堂僧問十五日已前八月秋猶熱十五日已後一天風更涼正當十五日以何𢫾示人師云今夜一輪滿清光何処無進云与麼則素魄今宵已十分廣寒宮闕啟重門師云清風拂白月進云青風露桂誰是心空及第人師云切忌遭点額進云昔日馬大師翫月次問諸子云正當恁麼時如何百丈云正好修行意旨作麼生師云明眼人落井進云西坣道正好供養又作麼生師云失却半秊糧進云南泉拂袖便去可謂家富少嬌師云不許夜行進云馬師云禪皈海經皈蔵唯有普願独超物外大似怜子不斍醜師云一塲敗進云後来佛光禪師頌曰馬師父子弄琵琶無奈江西月色何還端的也无師云幾證蜂桶羊進云將謂㪯𠀍賞音少更有鵉膠續断絃師云離絃一箭新羅外進云非但人天聞未聞四生九類霑㤙澤師云相識滿天下知心能幾人乃云明月上孤峰雪步沒眼中誰著屑瘦鶴翹寒柖大眾還見麼雲外早飛去也拋拂下座謝書記上堂㪯五祖演和尚云若有人向空裏書淂祖師西来意五字老僧展坐具拜伊頌云只這虚空量大紙縦橫无欠亦无餘西来五字炳然露誰識有人背手書重九上堂陶靖節𠋣欄干三玄𣅀隔重関何也采匊東籬望南山開炉上堂僧問行者擊皷和尚陞座大眾問訊侍者燒香那亇是賔主相見処師云坐立儼然進云只如道南方火炉頭有亇無賔主話此意如何師云照顧眉毛進云金峰門下今日開炉把木佛作薪淂麼師云只𢙢有眉墮落底進云與麼則靈九轉透香師云切忌貪它一粒米僧礼拜師乃云佛性義時節緣冷灰堆裏黑豆𪹼然雖然火種无多子端的今年勝去年冬夜小參天寒人寒滴水滴凍低頭坐囲炉仰面看梁棟誰管否去㤗来任它砂飛石走堪咲溈仰呈懞袋叉手進前少賣弄何也楚雞不是山鳳復举洞山冬夜喫菓子次問㤗首座有一物黑似漆常在動用中動用中収不淂過在甚麼処㤗云過在動用中山令侍者掇退菓卓拈云尽道㤗首座鈍鳥宿芦老洞山俊鷹摩霄殊不知吳地雪寒越山風暖至節上堂謝檀那至寒岩那畔石筍生谷暖囬刧外春君子道長好時節慶雲瑞氣滿天新謝秉拂上堂拈主丈云龜毛拂子有放有収兔角拄杖有縦有橫日前四頭首恁麼受用去了也只如龜毛兔角作麼生受用去卓一下云有意時添意不風流処也風流臘八上堂六年冷坐髑髏未𠃵半夜成道欺它自瞞瞿曇性命却在山僧手裏卓主丈云霜刀㪯処斗牛寒臘月望上堂此亇事不閑公案未透咬定牙関雲門一曲機先會臘月光隂一瞬間元旦上堂時哉天新地新万象森羅氶化育野花啼鳥一般春上元上堂乱線孟春三五雨不知天上月圎時迦文錯受燃灯記千古貪光心自飢只有龍潭老一吹吹滅去啞眾裏猶有鼻咲底何也我見燈明佛本光瑞如此三月半上堂万機休罷千聖不休論向上向下莫全提半提何也鷓鴣飛過落花谿四月旦上堂虚玄大道無真宗機先句子電火罔通只如道麻三斤𠃵屎橛金圈栗𣗥蓬作麼生話會良久麥撚黃桒翼刷緣浴佛上堂拈起拄杖云未離兜率降王宮不萌枝上百花紅未出母胎度人畢兩手扶犂水過膝𢫾天地獨稱尊幸有老雲門知㤙正解報㤙卓丈下座結夏小參僧問聖制紀綱尽付来日𥘵宗家訓要在今宵不悋指南請師𢫾示師云徳嶠趙老垜生招箭進云南泉斬猫児意旨如何師云劈開華岳連天色進云趙州戴草鞋出去是甚心行師云放出黃河入海声僧礼拜師乃云揮王庫刀血濺梵天撾塗毒皷声震大千直得十聖三玄四生九類尽天下衲僧喪身失命所以護生湏是殺先自断其首殺尽始安居死水不蔵龍會淂亇中意當甚破草鞋銕船水上浮拍膝云可怜謝三郎月下自搖櫓翌日上堂安居結制取声安置篋中克期取證吹網欲令氣滿阿呵扇子𨁝跳上三十三天𡎺帝釋鼻孔東海鯉魚打一棒雨似盆傾濕𨚫西天那蘭陀寺戒賢論師袈裟角它抖擻衣𭁡整威儀合掌云慚愧慚愧海東扶桑囯裏小長老開口出粥飯氣大禪卓主丈云諦觀法王法法王法如是五月旦上堂欲知佛性義當觀時節囙緣時節既至其理自彰如何是彰底之理如何是時節囙緣良久霏梅雨洒危層五月山房冷似氷中夏上堂前半夏前三三後半夏後三三安居清眾直下罷參阿呵咲倒西天老瞿曇七月旦上堂絕頂新秋寒螿泣露声前句子側耳差悮諸人若也會淂許伱霄独步解夏小參驅耕夫之牛和𭰖合水奪飢人之食果州𩚄布金峰一夏更無嶮機絕境人參究只有茶淡飯大家聚頭喫了伱来問吾便和南不敢錯悞諸人一絲毫許雖然如是不許夜行何也宝山路滑上堂此亇㕝沒端倪向上向下全提半提金宝門下猶隔雲𭰖不論半滿不涉高低撫膝云到頭霜夜月任運落前溪中秋上堂中秋節誰共看馬師父子𮞏相熱瞞機前拂袖南泉老月下雲開光轉寒𭁡住淨智語終普中夏普僧問前半夏已徃後半夏未来正當今日願聞提唱師云閑觸著恒山蛇進云恁麼則高低普應前後無差師云臂長衫袖短進云記得僧問百丈如何是竒特事丈云独坐大雄峰意旨如何師云莫垜跟進云僧礼拜丈便打端的也無師云藍田射進云忽有人問和尚如何是竒特事且作麼生對師云有口堪喫飯進云爭奈學人無処展拜何師云殺人可恕無礼難容問時候如流九夏過半跟下事請師一次師云六月不𤍠五谷不𤍨進云從上佛祖提掇不起今日當陽七花八裂師㪯拂子問昔日臨済和尚示眾云赤肉團上有一無位真人常在諸人面門出入未證㨿者看此意如何師云換却你眼睛進云時有僧出問如何是無位真人済擒住云道道是何道理師云逼生蚕作進云僧擬議済拓開云無位真人是何乹屎橛作麼生領略師云覆水難收進云後来岩頭聞得不覺吐舌意在那裏師云招禍上身進云雪峰云臨済似白拈賊若何甄別師云雪峰還是普州人進云如二大老恁麼道還与臨済老人有相見分也無師云一畒之地三蛇九𣆨僧礼拜師乃云今夏東山集大成土匏金石皎如明少林一曲八音外十聖三賢側耳驚所以道釈迦勒猶是它奴悳山臨済退後有分自餘閑佛閑祖三千里外斫額然雖如是不是冤家不聚頭今夏同門法眷方外道友不期而来不約而集眉毛厮結鼻孔厮拄山野薄祐住山扵道无取茲者𠇩荷諸公輔弼保社山中無㕝過了半夏今日無端東語西話佛鑑師翁曰盖普湏是法性寬波瀾闊還它前輩大珠南陽徳山臨済岩頭羅山後来圎悟大慧應庵近来亦少雖然雲月是同溪山各異大底有大底生涯小底有小底活計山僧不覚得便冝処落便冝矧此界他方山河大地日月星辰明暗色空破糞箕禿苕一放大光明出廣長舌無前無後一時了也所謂橫竪顕密橫無礙剎眾生三𠀍一切若一草若一木不不得名為普恁麼得猶未涉山僧一咳嗽在還會麼其或未然直湏具高識遠見擇善友師門放下複子急參透光隂倐忽二鼠侵藤一息不来異𠀍他生不覺一入馿胎馬腹去不知何刧出頭来可畏可畏所以古悳為此㕝孜切晝參夜參竪起脊梁忘飡廢寢豈不見臨済慧照禪師幼負出塵之志及落髮進具便慕禪宗初在黃檗會中三年不出僧堂行業純一時睦州為第一座乃問上座在這裏多少時済曰三秊曰曾參問否済曰不曾參不知問亇甚麼州曰何不問堂頭和尚如何是佛法的大意驅羊入屠門済便去問赤躰挨白刅問声未絕檗便打果然濟下来州云問話作麼生濟曰某甲問聲未絕和尚便打某甲不會㝡親州曰但更去問且要鈍鐵𭁡入紅鑪濟又問檗又打如是三度問三度被打禹門三級嶮濟白州曰早承激勸問法累蒙賜棒自恨障緣不領深𣅀今且辝去捨父逃逝州曰汝若去湏辝和尚了去忠告而導州先到黃檗処曰問話上坐雖是後生却甚竒特和尚方便接它已後為一株大𣗳覆䕃天下人去識人還它蒲鞋眼正睦州生時紅光滿室祥雲蓋空旬日方散日有重瞳面列七星持戒精嚴学通三蔵遊方印心扵断際激勸臨濟參黃檗接淂雲門嗣雪峰雲門臨済兩宗皆此老扶竪也故諸方歸慕陳尊宿亦皈鄉掩関織蒲鞋以養母故有陳蒲鞋之号済来日辞黃檗曰不湏他去徃高安灘頭參大愚必為汝破韓信背水濟到大愚曰甚処来済曰黃檗来愚曰黃檗有何言句済曰某甲三度問佛法的大意三度被打家醜外揚不知某甲有過无過自屎不斍臭愚曰黃檗麼老婆心切為汝得徹困更来這裏問有過無過鳳林吒之済扵言下大悟勵声曰元来黃檗佛法無多子囙地倒者囙地起愚搊住曰這尿床鬼子適来道有過無過如今却道黃檗佛法無多子伱見箇甚麼道理速道速道勾賊破家濟扵大愚𦚰下築三拳虎子未絕乳已有食牛氣愚拓開曰汝師黃檗非干我㕝古人相讓如是与今時貪嗣香底實霄壤也溈山㪯問𠇩山臨濟淂大愚力淂黃檗力𠇩曰非但𮪍頭亦把尾是精識精濟辞大愚却囬黃檗檗見便問這漢来去有甚了期三日不相見莫作旧時看濟曰為老婆心切出囚口便人事了侍立檗問甚処去来濟曰昨蒙和尚慈旨參大愚去来檗曰大愚有何言句済举前話檗曰大愚老漢饒舌待来痛与一頓隔靴抓痒済曰甚待来即今便打随後便掌冤有頭債有主檗曰這風顛漢来這裏捋済便喝閃電未收轟霹靂檗喚侍者曰引這風顛漢參堂去把断要津莫輕放過済住後曰夫為法者不避䘮身失命我黃檗先師処三度問佛法的大意三度被打六十痛棒如蒿枝拂相似諸人還知痛痒麼直饒黃檗通身是手棒如雨点臨濟若非求道之志遠大焉能有淂徹證時節直饒臨濟有遠大之志不出僧堂黃檗若非下𢙣辣手叚伱空向黑山鬼窟賺過一生所謂具高識遠見擇善友師門是也済栽松次檗曰深山裏㘽許多柖作甚麼濟曰一山門境致二後人作標榜道了將钁𡎺地三下檗曰雖然如是子已喫吾三十棒了也濟又𡎺地三下噓一噓檗曰吾宗到汝大興扵𠀍見子莫若父済果住鎮州臨濟建立黃檗宗旨學佀雲集普化克符二道者為股肱法道振一時示眾大凡演唱宗乗一句中湏具三玄門一玄門湏具三要有權有實有照有用汝諸人作麼生會即有三玄三要四料簡四賔主四喝四照用許多閑絡索大法未明滯在一途一轍底窺藩籬乎又有一頌大道絕同任向西東石火不及電光罔通只者一頌子即是殺人刀活人劒耳若能提得徳山末後句香嚴独脚頌雲門法身兩般病洞山三種滲漏以至東山牛過䆫櫺話一举即可点破具眼者辯取夫南岳青原兩𣲖雖分五家臨濟正宗輝騰千古光明照人兒孫滿寰海未寂寥矣豈非源深流長乎已為他児孫可不辱先祖啞今時学者𭰖文字義句埋沒自己本明不見黃梅七百人龍象眾中唯有亇不識字漢得衣法五家七宗宗𣲖皆從曹溪一𣲖出有甚閑工夫管他之乎者也况百家異学如山岳之高瀛浡之深一生兩生若為尽之夫子為万𠀍之師集三聖之事而為一大聖之事亦道吾猶及史之闕文也伱持蠡海一塲困苦參可之士直湏屏去所習專一研究苐一莫執迷待悟明暗兩岐染淨二邊左来也不是右来也不是通身無所安時肚裏七上八下時切忌臨崖而退万仞懸崖撒兩手放捨性命絕後𭁡蘇百尺竿頭進一步豁開活眼全躰現成三界二十五有當下平沉八万四千塵労随処解脫從前作碍作障底文字語言𭁡抱来橫拈倒用如龍得水似靠山風䬃二地電激雷轟有時鞭䇿衲僧有時号令佛祖黃檗臨濟退後吐舌不亦快哉濟半夏上黃檗山胡蜂不戀旧時窠見檗看經曰我將謂是亇人元来唵黑豆老和尚錯證羊了也住數日乃辝檗曰汝破夏来何不終夏去靈木迢然鳳不依𠋣濟曰某甲暫来礼拜和尚仁義道中不無你檗便打趁令去劈開華岳放出黃河濟行數里疑此事却囬終夏識法者懼雲岩半夏無人上山囙甚今日納敗闕良久云六月賣風人間𢙢無價喝一喝普終法語示石侍者上来的相承底非隂界中事眼相對間不容髮大抵煆聖凡烹佛祖大爐鞴𢙣鉗鎚断要生銕鑄就脫体荷擔不見克賔維那在興化會中喫棒趕出院意在那裏克賔因甚還承嗣它小𭃯今夏堂司欠人因䖍請石侍者充之殊無難色每扣籌室法戰機不讓山僧雖不行興化令秋風吹衣忽皈旧隐不能攔之俊如秋鷹方振揚快如駿駒絕超放是吾家真種草也切祝隨処流通法道應緣接續正宗至嘱示元侍者我有一句子威音已前兩手分付了也洎至踏步向前袖需語便道我宗無語句亦無一法人扵是透得兩重関銕壁銀山一咲摧威音已前消息即今歷現前有時在孤峰頂上與人相逢卻向十字街頭握手有時在十字街頭人相逢卻向孤峰頂上握手一切処一切時淨倮活鱍恁麼履踐始終不變以至臨死生禍福之際全是自家受用底時節也換身移步豈涉遲疑乎元侍者志道不群氣宇軒昂望他時異日大興法道去也至禱示在侍者英靈衲子氣吞佛祖當頭一不近人情昔守廓侍者辞興化參徳山問従上諸聖向甚麼処去山曰作麼作麼廓曰𠡠點飛龍馬跛鼈出頭来山便休去山来日出浴廓過茶山山接得撫廓背一下曰昨日公案作麼生廓曰者老漢今日方始瞥地山又休去廓侍者臨陣揮劒冷光閃爍若非徳山暗設機穽平地厮䧟幾乎被打破蔡州在侍者今欲下山參遍諸方切忌踏它覆轍直須未舉一步前勘破天下老漢了其或不然未免向它家虀甕裏淹殺示寒河照源大師此事不論男之与女僧之与俗唯一念超證千聖立在下風所以末山接得灌溪揚逆水波龍女勘破鶖子雷轟風馳雖然只如一人道不是神不是鬼變亇什麼一人忽然之間變成男子坐寳蓮華成正覺是一是二直下自能破末山龍女隱身無路示湛然㞐士威音已前有超卓処即今一念超證徧界不蔵脫体現成不分𠀍法佛法直下打成一片若能如是則居忠孝仁義源現宰官身合元亨利貞徳輔君撫民終日作為圎湛虚凝体不動終宵寂嘿展縮殺活用不廢恁麼信得及恁麼行履去一切処一切時淨倮活鱍以至洎生死之際渾是自家受用底時節也豈不見普現居士入圎悟室一日早朝囬到天津橋上馬躍忽有省直造天寧悟適出門遙見喚云居士且喜大事了畢士厲声云和尚眼花作麼悟便喝士亦喝扵是機鋒迅捷一日微恙忽索湯沐浴畢遂趺坐化偈云謾従来牧護今日分明呈露虗空拶倒須甚向上一路擲筆而逝是則平生學道靈驗末後得力光明也公只恁麼參取示禪人學道之要無他只在退步就己若能辨銕石心立决㝎志廢寢忘飡專確体究萬不失一也况這一叚事人本有底混沌未分該括萬有纖塵不動含吐十虚一切処一切時淨倮活鱍纔擬趣向便是千里萬里沒交涉到者裏英俊底直湏超然独脫不見雪峰知皷山緣熟一日驀胸擒住曰是甚麼山釋然了悟了心便忘唯微咲举手搖曳而已雪峰曰子作道理耶皷山復搖手曰和尚何道理之有峰便休去此是本分參禪樣子也古人扵了悟時了心猶忘况扵𠀍間種種雜念狂妄馳求之心乎公還承當得麼只者未承當底復是亇甚麼忽然識得落処雪峰皷山却向伱背後叉手示禪人示諭従辝座下杳阻面話願淂一語以為警䇿不見古人道契則霄壤共処趣異則覿面楚越公若廓然契悟則雖在數百里外何隔一絲毫乎矧及至大道絕同不千聖并立直得孤逈峭巍萬化千變風行草偃公如是信得及豈非暢快平生乎勉旃勉旃示禪人道人日用㕝如白日青天脫体現成遍界不蔵全佛法是𠀍法全𠀍法是佛法八面玲瓏無絲毫障礙処若能如是雖在塵勞中而不被塵勞之所染污雖在福貴中而不被福貴之所羅籠如蓮華不水也纔起佛見生𠀍間想當面蹉過了也所謂一種不通兩処失功只要胸次廓然不留纖末內忘己見外泯諸相萬端千緒打成一片儻根浮脚淺猶觸途成滯被目前万境所轉作麼生透脫生死牢関去切湏不捨晝夜孜矻退步体究忽然到大休歇大安樂之塲始知法喜禪恱之樂非𠀍間之樂可比然此樂無受者平一如混融无際便能処無為事行不言化流通正宗救末運弊豈非報佛祖深㤙耶示禪人挺特沒量漢卓然超佛祖坐臥色堆頭不一法作對更湏移步換身一句全提八面受敵絕物而照先機而轉纔凝神澄念墮在死水裏直湏無邉剎海風颯地雷轟電激變化無滯始得其或未然龍門嶮処点額曝腮所以雲門大師云尽乾坤大地無絲毫過患猶是轉句不見一色始是半提湏知有全提時莭鞭䇿佛祖号令衲僧只在全提時莭耳既存它種草切莫碌小了示禪人學道人胸衿未只在偷心未死尽直湏向極微細処𣣔起未起猛精彩看忽然脫体現成遍界不蔵遍不蔵処千眼也難窺有時石女腰邉截兔角有時銕牛背上刮龜毛不存竒特殊勝不墮平常无㕝恁麼履踐始終不変万秊一念一念万年以至臨死生禍福之際全是自家受用底時節豈涉遲疑乎示壽山講師我宗無語句更不立階梯坐断報化佛頭高踏毗盧頂上所以道釈迦勒猶是他奴至竟他是阿誰壽山若也点頭去山僧咬定牙関何也許由洗耳巢父牽牛法語終頌古即心即佛一𫨻光明天真自得皓玉無瑕雕文䘮德非心非佛非佛非心豈易聞暮風吹断碧溪雲虚堂永夜月為晝羽角可慙龍鳳群馬祖陞堂百丈捲席向上那一路師資全不顧月上孤頂寒霧卷岩露𡸁絲千尺意在深潭離鈎三寸子何不道蛟龍何必貪香餌隨例漁翁拋釣來跳過禹門三級浪任佗平地鼓風雷百丈耳聾黃蘗吐舌三日耳聾誰委得退身吐舌只麼來馬師一喝乾坤暗轟起一聲燒尾雷明招謙禪師暖処商量不謬明招獨眼龍雷聲一起電相千山雨過添新碧花放巖朵朵紅佛祖釋迦本來无影像丈六紫金身不動瑤華座全身現剎塵觀音悲願海深楊桺繫春圓通門戶巨闢塵塵佛光為石侍者請大唐撾皷扶桑陞堂白拈手𫨻意在當陽咦有破家子證蜂桶羊自為石侍者脕體无依𡋐断寰宇黑漆竹篦號令佛祖石侍者點首轉圓石扵千仞付鈯斧扵兩手為玉林居士掣電之機風雷之舌開盡三冬枯木花誰看九夏寒巖雪咦石霜之下有張拙無靣目漢誰見其端潮落海岩露雲𠬧天宇峭峻門不立階梯啞禹力不到処河勢流向西坐断乾坤殺活當機擬問如何雪刅橫飛正和五年丙辰十月卄日丑刻書偈坐化云坐脫立亡平地骨堆虚空筋斗剎海動風雷喝一喝徑山老圓照室中皆麟角鳳觜間出无學一人大似無毛鐵鷂宿鷺亭前扶桑國裏石火莫及電光罔通產下三足金烏飛上東山雲岩高高峯頂羅籠不住呼喚不回㝡初断命刀子便自倒行逆施沒踪跡処莫蔵身重遭捉敗夜半正明天曉不露吹滅銀燭未露爪牙等閑撞倒巨福山官馬厮踢甚慿據雲岩高峯佛國禪師機緣問答天岸廣首座請序㤗定三年丙寅春二月三日前鷄足山比丘清拙正澄拜書住下野州東山雲巖禪寺高峯和尚勑諡佛國禪師問答參學比丘慧廣編師始𠀍良田長樂寺見無學和尚勑諡佛光禪師問曰從來佛祖如冤家今朝覿靣難迴避不顧放身捨命処請師下断命手脚光云断命刀子在你手裏師曰吹毛元不動遍地是髑髏光云閑葛藤便問夾山云𡸁絲千尺意在深潭離鈎三寸子何不道近処下一轉語師曰龍門真躍鱗不隨漁人手光云你因什麼在醋甕裏身師振威一喝光云絲懸淥水浮定有無作麼生分賔主師曰一吸滄溟乾光云船子末後付夾山云蔵身処沒跡無跡処莫蔵身作麼生師曰敗闕不少光云賞你大膽放三十棒師曰爭奈棒頭在學人手裏光云回這棒頭打東福和尚師曰祖不了殃及孫師甞受業東福和尚又一日因入室光問云馬祖陞堂百丈捲席意𣅀如何師曰一狀領過光云你因什麼向老僧鉢盂裏洗浴師曰和尚鉢盂百雜碎光呵呵大笑云也得也得光自福山致書求平日述作師以偈荅曰一見明師意轉閑癡憨終日坐煙巒飽柴飽水无餘事禪道文章何処安師後福山一日光謂師云你但來呼老漢足矣何必有重賞使我不安師曰某甲特來礼拜和尚更不採一莖菜不費一粒米供養和尚去光云老漢老貪承供養鼻下一坃深万丈橫吞羅漢竪吞佛却道今日欠鹽醬師舉拳曰只這一箇吞吐不下師云汝當拈出老漢退身有分若是東山下烏藤更喫五頓師打光一拳光呵呵大笑一日因遊山光問云開口因甚不在舌頭上師吐舌曰果然出廣長舌光云家法不如此師曰待肯作麼光云注解不成禪師振威一喝光云試分賔主看師曰今日相見光云我不識你師拂袖去光喚云且来師歸来云適来方丈裏喫茶了光云汝只可借路去不可借路来師曰步步無跡光云老僧要汝出草師曰山頂澗底一見便見光云一生如此他日有悔在師曰慶快平生是今日孰云千里賺吾來光云吾當為汝助喜雖然如是靈禽自惜羽毛師曰謝和尚老婆心切光云付授之際不可草草即作一偈莫怪吾多事楊花落也驚三十年後去擲地作金聲師便礼拜光謂師曰我要你在此伴我三兩月老懷方快活師曰雖然爭如䇿杖歸山去長嘯一聲煙霧深光云非此謂也我年老心孤要真正知心暖我懷抱也夜話之次光謂師曰東山戲幾日老漢要你細談話在一回相見千難万難此事造次不得師曰某日夕不欲離和尚左右只恐雲山无主人伏乞今宵示火炉頭話光云一棒一喝擊石火閃電光容易若是佛祖綿密処湏是透得圓熟七出八沒処如十鏡十燈光光相照光光不碍斯為妙也師曰万象森羅一毛頭上十方三世一彈𢫾間光云若如是你行此路不妨亦要有變他頭靣各別為宗匠師曰是龍上天是虵入草光云湏當如大鈞播物不可局扵一枝師曰七手八神頭鬼靣光云好好便將衣法俱付了云千万為佛法接人師受法衣云何処不稱尊師一日看真如錄光謂云長老看老僧拙作中間頭靣不同出沒非一不可以實跡求此名虚玄大道无真宗臨濟的的相承自古自今千万人中只求一人半人髣髣髴髴者无限的的到地頭者難其人冝細細涵泳且虚心為第一嵗久月深自有不思議之妙矣師曰虚玄大道无真宗那邊撒手任向西東光云一切不存是臨濟宗千差万別莫不朝東師曰禹力不到処河聲流向西光云汝雖如此老僧猶有話在師曰不勘自敗光云放汝一線道光囙夜話之次問云夜半正明天曉不露長老作麼生聲未了師吹滅燭光云長老却是一箇大蟲師曰爪牙未露在光云老僧年邁師曰請和尚眠去光云伏惟安置無學元和尚載道而東流通洋洋焉東溟共主皜皜乎旭日爭明今觀其嗣子高峯日和尚印心傳器之際披肝瀝膽劈腸𭃰心一唱一酬一啐一機機的破的大似轉圓石于千仞之上走明珠扵一柈之中芥輥鍼投了无凝滯灼然擲地金聲何待三十年後若曰玄大道无真宗臨濟的的相承豈有今日所一山寧和尚一挨一拶嗔拳互舉𤍠血相噴此又不可以言意求之㤗定三禩丙寅嵗端月既日禾城本覺靈石如芝書佛祖大事脚跟下洞明本分人相見一抑一揚无非揭示箇一子直是毫髮無間所謂臨機不讓師也無學和尚得先徑山圓照之𣅀潜鞭熟鍊極妙窮玄如善舞太阿無不中其矩度今觀佛國高峯長老問荅橫箭鋒相直有如老東山山之與南堂說細大法門殊無少異但當時舉子胡看狗話必欲結南堂之舌而使自己亦无嚥唾処為百了千當不知高峯到此果能心死路絕否其徒廣首座出此錄為示為題其後旹㤗定三年三月初五日金陵鳳臺住山清茂題師一日相訪一山和尚山問云和尚在東山尋常以何示徒師曰洞中山色四時好雲外溪聲一樣寒山云莫是瞎時人眼麼師曰正法眼蔵增高價山便喝師連喝兩喝喫茶之次山又問云水牯牛水草甘麼師曰飽臥斜陽不去山云猶欠痛鞭在師作吼勢傾頭撞倒山山呵呵大笑
